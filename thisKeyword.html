<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var address = {
        company: "javascript",
        city: "tenkasi",
        state: "Tamil Nadu",
        fullAddress: function () {
          return this.company + " " + this.city + " " + this.state;
        },
      };
      var fetch = address.fullAddress();
      document.writeln(fetch);
    </script>
  </body>
</html>
