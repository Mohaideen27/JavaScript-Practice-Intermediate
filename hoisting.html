<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoisting</title>
  </head>
  <body>
    <script>
      x = 10;
      document.write(x);
      var x;
    </script>
    <script>
      document.write(sum(10, 20));
      function sum(a, b) {
        return a + b;
      }
    </script>
  </body>
</html>
